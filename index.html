<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追觅配件查询系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 40px 20px 25px;
            color: white;
        }
        .header h1 { font-size: 2rem; margin-bottom: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 0.95rem; opacity: 0.9; }

        .search-panel {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
        }
        .form-group label .required { color: #e74c3c; margin-left: 2px; }
        .form-group label .optional { color: #888; font-weight: 400; font-size: 0.8rem; margin-left: 4px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .form-group input::placeholder { color: #bbb; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }

        /* Result Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 640px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-close {
            position: absolute;
            top: 12px; right: 12px;
            width: 32px; height: 32px;
            border: none;
            background: rgba(0,0,0,0.08);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            color: #555;
            z-index: 10;
        }
        .modal-close:hover { background: rgba(0,0,0,0.15); }

        .modal-header {
            padding: 22px 24px 0;
        }
        .modal-header h2 {
            font-size: 1.25rem;
            color: #333;
            margin-bottom: 4px;
        }
        .modal-header .count {
            font-size: 0.85rem;
            color: #888;
        }

        .result-list {
            padding: 16px 20px 20px;
        }
        .result-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #f8f9fb;
            border: 1px solid #eceef2;
            transition: all 0.2s ease;
        }
        .result-item:last-child { margin-bottom: 0; }
        .result-item:hover { background: #f0f2f6; border-color: #d0d4dc; }

        .result-img {
            width: 80px; height: 80px;
            border-radius: 10px;
            background: linear-gradient(135deg, #e8ecf1 0%, #dce2e8 100%);
            display: flex; align-items: center; justify-content: center;
            color: #999;
            font-size: 1.6rem;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .result-img:hover { transform: scale(1.05); }
        .result-img img { width: 100%; height: 100%; object-fit: cover; }
        .result-img .img-placeholder {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%;
            background: #f0f2f5;
            color: #bbb;
            font-size: 0.7rem;
            gap: 2px;
        }
        .result-img .img-placeholder svg {
            width: 24px; height: 24px;
            stroke: #ccc;
        }

        /* Image lightbox */
        .lightbox-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .lightbox-overlay.active { display: flex; }
        .lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .lightbox-close {
            position: absolute;
            top: 16px; right: 16px;
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .result-info { flex: 1; min-width: 0; }
        .result-info .name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #222;
            margin-bottom: 6px;
            line-height: 1.35;
        }
        .result-info .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            font-size: 0.82rem;
            color: #666;
        }
        .result-info .meta span {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .result-info .part-number {
            font-family: 'Courier New', monospace;
            color: #667eea;
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        /* No result */
        .no-result-body {
            text-align: center;
            padding: 50px 25px;
        }
        .no-result-body h3 { color: #e74c3c; margin-bottom: 8px; font-size: 1.1rem; }
        .no-result-body p { color: #777; font-size: 0.9rem; }

        .footer-note {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem; }
            .search-panel { padding: 22px 18px; }
            .modal-content { max-width: 100%; }
            .result-item { gap: 10px; padding: 12px; }
            .result-img { width: 60px; height: 60px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>追觅配件查询系统</h1>
            <p>输入关键词查询个护 / 扫地机配件料号</p>
        </div>

        <div class="search-panel">
            <div class="form-group">
                <label>备件名称关键词 <span class="required">*</span></label>
                <input type="text" id="partName" placeholder="例如：风嘴、刀头、主刷、滤网、边刷..." autocomplete="off">
            </div>

            <div class="form-group">
                <label>产品品类 <span class="optional">（可选）</span></label>
                <select id="categorySelect">
                    <option value="">全部品类</option>
                </select>
            </div>

            <div class="form-group">
                <label>所在国家 <span class="optional">（可选）</span></label>
                <select id="countrySelect">
                    <option value="">全部国家</option>
                </select>
            </div>

            <div class="form-group">
                <label>查找机型 <span class="optional">（可选）</span></label>
                <input type="text" id="modelInput" placeholder="例如：Glory、L10s Ultra、X40..." autocomplete="off">
            </div>

            <button class="submit-btn" id="confirmBtn">查询</button>
        </div>

        <div class="footer-note">
            追觅配件查询系统
        </div>
    </div>

    <!-- Results Modal -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-header">
                <h2 id="resultTitle">查询结果</h2>
                <div class="count" id="resultCount"></div>
            </div>
            <div class="result-list" id="resultList"></div>
        </div>
    </div>

    <!-- No Result Modal -->
    <div class="modal-overlay" id="noResultModal">
        <div class="modal-content">
            <button class="modal-close" id="noResultClose">&times;</button>
            <div class="no-result-body">
                <h3>未找到匹配结果</h3>
                <p>请尝试更换关键词，或检查拼写是否正确</p>
            </div>
        </div>
    </div>

    <!-- Image Lightbox -->
    <div class="lightbox-overlay" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <img class="lightbox-img" id="lightboxImg" src="" alt="">
    </div>

    <script src="data.js"></script>
    <script>
        function getCountries() {
            const countries = new Set();
            sparePartsData.forEach(item => { if (item.country) countries.add(item.country); });
            return Array.from(countries).sort();
        }

        function getCategories() {
            const cats = new Set();
            sparePartsData.forEach(item => { if (item.category) cats.add(item.category); });
            return Array.from(cats).sort();
        }

        function populateSelects() {
            const countrySel = document.getElementById('countrySelect');
            getCountries().forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                countrySel.appendChild(opt);
            });

            const catSel = document.getElementById('categorySelect');
            getCategories().forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                catSel.appendChild(opt);
            });
        }

        function getCountryFlag(country) {
            const flags = {
                '中国': '\uD83C\uDDE8\uD83C\uDDF3', '日本': '\uD83C\uDDEF\uD83C\uDDF5', '韩国': '\uD83C\uDDF0\uD83C\uDDF7',
                '澳大利亚': '\uD83C\uDDE6\uD83C\uDDFA', '美国': '\uD83C\uDDFA\uD83C\uDDF8', '德国': '\uD83C\uDDE9\uD83C\uDDEA',
                '英国': '\uD83C\uDDEC\uD83C\uDDE7', '法国': '\uD83C\uDDEB\uD83C\uDDF7', '意大利': '\uD83C\uDDEE\uD83C\uDDF9',
                '西班牙': '\uD83C\uDDEA\uD83C\uDDF8', '加拿大': '\uD83C\uDDE8\uD83C\uDDE6', '新加坡': '\uD83C\uDDF8\uD83C\uDDEC',
                '马来西亚': '\uD83C\uDDF2\uD83C\uDDFE', '泰国': '\uD83C\uDDF9\uD83C\uDDED', '越南': '\uD83C\uDDFB\uD83C\uDDF3',
                '印度': '\uD83C\uDDEE\uD83C\uDDF3', '俄罗斯': '\uD83C\uDDF7\uD83C\uDDFA', '巴西': '\uD83C\uDDE7\uD83C\uDDF7',
                '墨西哥': '\uD83C\uDDF2\uD83C\uDDFD', '印尼': '\uD83C\uDDEE\uD83C\uDDE9', '菲律宾': '\uD83C\uDDF5\uD83C\uDDED',
                '荷兰': '\uD83C\uDDF3\uD83C\uDDF1', '波兰': '\uD83C\uDDF5\uD83C\uDDF1', '土耳其': '\uD83C\uDDF9\uD83C\uDDF7',
                '阿联酋': '\uD83C\uDDE6\uD83C\uDDEA', '沙特阿拉伯': '\uD83C\uDDF8\uD83C\uDDE6', '以色列': '\uD83C\uDDEE\uD83C\uDDF1',
                '瑞典': '\uD83C\uDDF0\uD83C\uDDEA', '挪威': '\uD83C\uDDF3\uD83C\uDDF4', '丹麦': '\uD83C\uDDE9\uD83C\uDDF0',
                '芬兰': '\uD83C\uDDEB\uD83C\uDDEE', '台湾': '\uD83C\uDDF9\uD83C\uDDFC', '欧洲': '\uD83C\uDDEA\uD83C\uDDFA',
                '欧美': '\uD83C\uDDFA\uD83C\uDDE6', '通用': '\uD83C\uDF10'
            };
            return flags[country] || '\uD83C\uDF10';
        }

        function getCategoryIcon(cat) {
            return cat === '个护' ? '\u2728' : (cat === '扫地机' ? '\uD83E\uDDF9' : '\uD83D\uDCC1');
        }

        function doSearch() {
            const keyword = document.getElementById('partName').value.trim().toLowerCase();
            const country = document.getElementById('countrySelect').value;
            const model = document.getElementById('modelInput').value.trim().toLowerCase();
            const category = document.getElementById('categorySelect').value;

            if (!keyword) {
                alert('请输入备件名称关键词');
                document.getElementById('partName').focus();
                return;
            }

            const matched = sparePartsData.filter(item => {
                const text = (item.name + ' ' + (item.partNumber || '') + ' ' + (item.model || '') + ' ' + (item.description || '')).toLowerCase();
                const matchKeyword = text.includes(keyword) || (item.partNumber && item.partNumber.toLowerCase().includes(keyword));
                const matchCountry = !country || item.country === country;
                const matchModel = !model || (item.model && item.model.toLowerCase().includes(model)) || model.includes((item.model || '').toLowerCase());
                const matchCategory = !category || item.category === category;
                return matchKeyword && matchCountry && matchModel && matchCategory;
            });

            if (matched.length === 0) {
                showNoResult();
            } else {
                showResults(matched, keyword, country, model, category);
            }
        }

        function showResults(items, keyword, country, model, category) {
            const overlay = document.getElementById('resultModal');
            const title = document.getElementById('resultTitle');
            const count = document.getElementById('resultCount');
            const list = document.getElementById('resultList');

            const filters = [];
            if (category) filters.push(category);
            if (country) filters.push(country);
            if (model) filters.push(model);
            title.textContent = '"' + keyword + '"' + (filters.length ? ' · ' + filters.join(' · ') : '') + ' 的查询结果';
            count.textContent = '共找到 ' + items.length + ' 条记录';

            list.innerHTML = items.map(item => {
                const placeholderSvg = '<div class="img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>暂无图片</span></div>';
                const fallbackPlaceholder = placeholderSvg.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const imgHtml = item.image
                    ? '<img src="' + item.image + '" alt="' + item.name + '" loading="lazy" onerror="if(!this.dataset.fallback){this.dataset.fallback=\'1\';var s=this.src.replace(\'/images/\',\'/\');if(s!==this.src){this.src=s;}else{this.style.display=\'none\';this.parentElement.innerHTML=\'' + fallbackPlaceholder + '\';}}else{this.style.display=\'none\';this.parentElement.innerHTML=\'' + fallbackPlaceholder + '\';}">'
                    : placeholderSvg;
                return '<div class="result-item">' +
                    '<div class="result-img" data-img="' + (item.image || '') + '" onclick="openLightbox(this)">' + imgHtml + '</div>' +
                    '<div class="result-info">' +
                        '<div class="name">' + item.name + '</div>' +
                        '<div class="meta">' +
                            '<span>' + getCategoryIcon(item.category) + ' ' + item.category + '</span>' +
                            '<span>' + getCountryFlag(item.country) + ' ' + item.country + '</span>' +
                            (item.model ? '<span>\uD83D\uDD27 ' + item.model + '</span>' : '') +
                        '</div>' +
                        '<div class="part-number">' + item.partNumber + '</div>' +
                    '</div>' +
                '</div>';
            }).join('');

            overlay.classList.add('active');
        }

        function showNoResult() {
            document.getElementById('noResultModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function openLightbox(el) {
            const imgUrl = el.getAttribute('data-img');
            if (!imgUrl) return;
            const lbImg = document.getElementById('lightboxImg');
            lbImg.onerror = function() {
                if (!lbImg.dataset.fallback) {
                    lbImg.dataset.fallback = '1';
                    var s = lbImg.src.replace('/images/', '/');
                    if (s !== lbImg.src) lbImg.src = s;
                }
            };
            lbImg.src = imgUrl;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            const lbImg = document.getElementById('lightboxImg');
            lbImg.src = '';
            delete lbImg.dataset.fallback;
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateSelects();

            document.getElementById('confirmBtn').addEventListener('click', doSearch);

            ['partName', 'categorySelect', 'countrySelect', 'modelInput'].forEach(id => {
                document.getElementById(id).addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') doSearch();
                });
            });

            document.getElementById('modalClose').addEventListener('click', () => closeModal('resultModal'));
            document.getElementById('noResultClose').addEventListener('click', () => closeModal('noResultModal'));

            document.getElementById('resultModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal('resultModal');
            });
            document.getElementById('noResultModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal('noResultModal');
            });

            document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
            document.getElementById('lightbox').addEventListener('click', (e) => {
                if (e.target === e.currentTarget || e.target.id === 'lightboxImg') closeLightbox();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal('resultModal');
                    closeModal('noResultModal');
                    closeLightbox();
                }
            });
        });
    </script>
</body>
</html>
