<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追觅配件查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 50px 20px 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .search-panel {
            background: white;
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
        }

        .form-group label .required {
            color: #e74c3c;
            margin-left: 2px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            color: #666;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .modal-close:hover {
            background: rgba(0,0,0,0.2);
        }

        .modal-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 4rem;
        }

        .modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-body h2 {
            font-size: 1.4rem;
            color: #333;
            margin-bottom: 5px;
        }

        .modal-subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            width: 90px;
            color: #666;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .detail-value {
            flex: 1;
            color: #333;
            font-weight: 500;
        }

        .detail-value.part-number {
            font-family: 'Courier New', monospace;
            color: #667eea;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .no-result-modal .modal-body {
            text-align: center;
            padding: 50px 25px;
        }

        .no-result-modal h2 {
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .no-result-modal p {
            color: #666;
        }

        .footer-note {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 25px;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.6rem;
            }

            .search-panel {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💇 个护配件查询系统</h1>
            <p>输入配件名称、选择国家、填写机型，一键查询料号</p>
        </div>

        <div class="search-panel">
            <div class="form-group">
                <label>备件名称 <span class="required">*</span></label>
                <input type="text" id="partName" placeholder="例如：主刷组件、HEPA滤网..." autocomplete="off">
            </div>

            <div class="form-group">
                <label>所在国家 <span class="required">*</span></label>
                <select id="countrySelect">
                    <option value="">请选择国家</option>
                </select>
            </div>

            <div class="form-group">
                <label>查找机型 <span class="required">*</span></label>
                <input type="text" id="modelInput" placeholder="例如：D10、H12 Pro..." autocomplete="off">
            </div>

            <button class="submit-btn" id="confirmBtn">🔍 确认查询</button>
        </div>

        <div class="footer-note">
            追觅个护配件查询 · 数据仅供参考
        </div>
    </div>

    <!-- Result Modal -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-content" id="resultContent">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-image" id="modalImage">📷</div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- No Result Modal -->
    <div class="modal-overlay" id="noResultModal">
        <div class="modal-content no-result-modal">
            <button class="modal-close" id="noResultClose">&times;</button>
            <div class="modal-body">
                <h2>😕 未找到匹配结果</h2>
                <p>请检查备件名称、国家或机型是否输入正确</p>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // 获取所有唯一的国家列表
        function getCountries() {
            const countries = new Set();
            accessoriesData.forEach(item => {
                if (item.country) countries.add(item.country);
            });
            return Array.from(countries).sort();
        }

        // 填充国家下拉框
        function populateCountrySelect() {
            const select = document.getElementById('countrySelect');
            const countries = getCountries();
            countries.forEach(country => {
                const option = document.createElement('option');
                option.value = country;
                option.textContent = country;
                select.appendChild(option);
            });
        }

        // 获取国旗emoji
        function getCountryFlag(country) {
            const flags = {
                '中国': '🇨🇳', '日本': '🇯🇵', '韩国': '🇰🇷', '澳大利亚': '🇦🇺',
                '美国': '🇺🇸', '德国': '🇩🇪', '英国': '🇬🇧', '法国': '🇫🇷',
                '意大利': '🇮🇹', '西班牙': '🇪🇸', '加拿大': '🇨🇦', '新加坡': '🇸🇬',
                '马来西亚': '🇲🇾', '泰国': '🇹🇭', '越南': '🇻🇳', '印度': '🇮🇳',
                '俄罗斯': '🇷🇺', '巴西': '🇧🇷', '墨西哥': '🇲🇽', '印尼': '🇮🇩',
                '菲律宾': '🇵🇭', '荷兰': '🇳🇱', '波兰': '🇵🇱', '土耳其': '🇹🇷',
                '阿联酋': '🇦🇪', '沙特阿拉伯': '🇸🇦', '以色列': '🇮🇱', '瑞典': '🇸🇪',
                '挪威': '🇳🇴', '丹麦': '🇩🇰', '芬兰': '🇫🇮'
            };
            return flags[country] || '🌍';
        }

        // 执行查询
        function doSearch() {
            const partName = document.getElementById('partName').value.trim().toLowerCase();
            const country = document.getElementById('countrySelect').value;
            const model = document.getElementById('modelInput').value.trim().toLowerCase();

            if (!partName) {
                alert('请输入备件名称');
                document.getElementById('partName').focus();
                return;
            }
            if (!country) {
                alert('请选择所在国家');
                document.getElementById('countrySelect').focus();
                return;
            }
            if (!model) {
                alert('请输入查找机型');
                document.getElementById('modelInput').focus();
                return;
            }

            const matched = accessoriesData.filter(item => {
                const matchName = item.name.toLowerCase().includes(partName) ||
                    (item.partNumber && item.partNumber.toLowerCase().includes(partName));
                const matchCountry = item.country === country;
                const matchModel = !item.model || item.model.toLowerCase().includes(model) ||
                    model.includes(item.model.toLowerCase());
                return matchName && matchCountry && matchModel;
            });

            if (matched.length === 0) {
                showNoResult();
            } else {
                // 如果有多个匹配，取第一个（或可以展示列表）
                showResult(matched[0]);
            }
        }

        // 显示查询结果弹窗
        function showResult(item) {
            const overlay = document.getElementById('resultModal');
            const imageDiv = document.getElementById('modalImage');
            const bodyDiv = document.getElementById('modalBody');

            if (item.image) {
                imageDiv.innerHTML = `<img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'; this.parentElement.textContent='📷'; this.parentElement.style.display='flex'; this.parentElement.style.alignItems='center'; this.parentElement.style.justifyContent='center';">`;
            } else {
                imageDiv.textContent = '📷';
            }

            bodyDiv.innerHTML = `
                <h2>${item.name}</h2>
                <div class="modal-subtitle">${item.category || '配件'} · ${getCountryFlag(item.country)} ${item.country}</div>
                <div class="detail-row">
                    <span class="detail-label">料号</span>
                    <span class="detail-value part-number">${item.partNumber}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">适配机型</span>
                    <span class="detail-value">${item.model || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">国家</span>
                    <span class="detail-value">${getCountryFlag(item.country)} ${item.country}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">品类</span>
                    <span class="detail-value">${item.category || '-'}</span>
                </div>
                ${item.description ? `
                <div class="detail-row">
                    <span class="detail-label">说明</span>
                    <span class="detail-value">${item.description}</span>
                </div>
                ` : ''}
                ${item.price ? `
                <div class="detail-row">
                    <span class="detail-label">价格</span>
                    <span class="detail-value">${item.price}</span>
                </div>
                ` : ''}
            `;

            overlay.classList.add('active');
        }

        // 显示无结果弹窗
        function showNoResult() {
            document.getElementById('noResultModal').classList.add('active');
        }

        // 关闭弹窗
        function closeModal(overlayId) {
            document.getElementById(overlayId).classList.remove('active');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            populateCountrySelect();

            document.getElementById('confirmBtn').addEventListener('click', doSearch);

            // 回车键触发查询
            ['partName', 'countrySelect', 'modelInput'].forEach(id => {
                document.getElementById(id).addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') doSearch();
                });
            });

            document.getElementById('modalClose').addEventListener('click', () => closeModal('resultModal'));
            document.getElementById('noResultClose').addEventListener('click', () => closeModal('noResultModal'));

            // 点击遮罩关闭
            document.getElementById('resultModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal('resultModal');
            });
            document.getElementById('noResultModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal('noResultModal');
            });

            // ESC关闭
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal('resultModal');
                    closeModal('noResultModal');
                }
            });
        });
    </script>
</body>
</html>
